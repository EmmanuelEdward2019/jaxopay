name: Deploy Backend to Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to Droplet via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./jaxopay-backend/*, !./jaxopay-backend/node_modules"
          target: "/home/jaxo/jaxopay-backend"
          strip_components: 2

      - name: SSH into Droplet to Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/jaxo/jaxopay-backend
            
            echo "Installing dependencies..."
            npm install
            
            echo "Checking for pm2..."
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi
            
            echo "Restarting application..."
            pm2 start src/server.js --name "jaxopay-backend" || pm2 restart "jaxopay-backend"
            pm2 save
            
            echo "Deployment successful!"
